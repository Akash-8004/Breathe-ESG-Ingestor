[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_data"

[deploy]
startCommand = "gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT"

healthcheckPath = "/health/"

healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
